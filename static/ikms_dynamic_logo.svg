<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <!-- Dynamic vibrant gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#818cf8" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Abstract Node representing 'i' / AI Core -->
  <g transform="translate(50, 60)" filter="url(#glow)">
    <!-- Floating glowing dot -->
    <circle cx="0" cy="-28" r="12" fill="url(#brandGrad)" />
    <!-- The pillar of the 'i' -->
    <rect x="-10" y="-6" width="20" height="42" rx="10" fill="url(#brandGrad)" />
    
    <!-- Flow lines symbolizing data/KMS orbit -->
    <path d="M-35,-10 A 40 40 0 0 0 35,-10" fill="none" stroke="url(#brandGrad)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <path d="M-50,12 A 55 55 0 0 0 50,12" fill="none" stroke="url(#brandGrad)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  </g>
  
  <!-- Minimalist Typography -->
  <text x="120" y="80" font-family="'Inter', -apple-system, sans-serif" font-weight="800" font-size="64" fill="url(#brandGrad)" letter-spacing="-2">
    KMS
  </text>
  
  <!-- Futuristic subtext -->
  <text x="125" y="105" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#9ca3af" letter-spacing="6">
    INTELLIGENCE
  </text>
</svg>
